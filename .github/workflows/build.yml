name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install cython buildozer

      - name: Initialize Buildozer
        run: |
          buildozer init
          sed -i 's/title = .*/title = Parental Report/' buildozer.spec
          sed -i 's/package.name = .*/package.name = parentalreport/' buildozer.spec
          sed -i 's/package.domain = .*/package.domain = org.kimjoo/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy,pyjnius/' buildozer.spec
          sed -i 's/# android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/# android.minapi = .*/android.minapi = 24/' buildozer.spec

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
