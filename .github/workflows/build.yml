name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip build-essential git zip unzip \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev

      - name: Install Python dependencies
        run: |
          pip3 install --upgrade pip
          pip3 install cython buildozer

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Init buildozer
        run: |
          buildozer init
          sed -i 's/title = .*/title = Parental Report/' buildozer.spec
          sed -i 's/package.name = .*/package.name = parentalreport/' buildozer.spec
          sed -i 's/package.domain = .*/package.domain = org.kimjoo/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy,pyjnius/' buildozer.spec
          sed -i 's/# android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/# android.minapi = .*/android.minapi = 24/' buildozer.spec

      - name: Build debug APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
