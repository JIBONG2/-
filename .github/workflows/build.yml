name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git zip unzip openjdk-17-jdk libffi-dev libssl-dev

      - name: Install buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install cython
          pip3 install buildozer

      - name: Init buildozer
        run: |
          buildozer init
          sed -i 's/title = .*/title = Parental Report/' buildozer.spec
          sed -i 's/package.name = .*/package.name = parentalreport/' buildozer.spec
          sed -i 's/package.domain = .*/package.domain = org.kimjoo/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy,pyjnius/' buildozer.spec

      - name: Build debug APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
